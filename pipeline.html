<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YG Master Pipeline v3</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--teal:#48C4CC;--pink:#EF3295;--purple:#9B6FD4;--dark:#0A0E17;--surface:#111827;--surface2:#1A2237;--border:#253049;--text:#E2E8F0;--text-dim:#8492A6;--text-muted:#4A5568;--green:#22C55E;--amber:#F59E0B;--red:#EF4444;--blue:#3B82F6;--cyan:#06B6D4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:1.5rem}
.ctr{max-width:960px;margin:0 auto}
.hdr{text-align:center;margin-bottom:1.8rem;padding-bottom:1.5rem;position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--teal),var(--pink))}
.hdr h1{font-family:'JetBrains Mono',monospace;font-size:1.7rem;font-weight:800;letter-spacing:-0.02em;background:linear-gradient(135deg,var(--teal),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--text-dim);font-size:0.82rem;margin-top:0.25rem;font-family:'JetBrains Mono',monospace}
.hdr .dt{color:var(--text-muted);font-size:0.68rem;margin-top:0.3rem;font-family:'JetBrains Mono',monospace}

/* Scorecard */
.sc{display:grid;grid-template-columns:repeat(4,1fr);gap:0.6rem;margin-bottom:1rem}
.sb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.8rem;text-align:center}
.sn{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:800;line-height:1}
.sl{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.2rem}

/* Master bar */
.mb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;margin-bottom:1rem}
.mbt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.5rem}
.mbl{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em}
.mbp{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--teal),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bt{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));border-radius:4px;transition:width 0.6s cubic-bezier(0.25,0.46,0.45,0.94)}

/* Motivation */
.moto{text-align:center;padding:0.7rem;margin-bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--teal);border:1px dashed var(--border);border-radius:8px;background:rgba(72,196,204,0.04)}

/* Filters */
.flt{display:flex;gap:0.4rem;margin-bottom:0.5rem;flex-wrap:wrap}
.fb{font-family:'JetBrains Mono',monospace;font-size:0.62rem;padding:0.3rem 0.6rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.04em}
.fb:hover{border-color:var(--teal);color:var(--teal)}
.fb.on{background:rgba(72,196,204,0.12);border-color:var(--teal);color:var(--teal)}

/* Legend */
.leg{display:flex;gap:0.7rem;flex-wrap:wrap;margin-bottom:1.2rem;padding:0.5rem 0.7rem;background:var(--surface);border:1px solid var(--border);border-radius:7px}
.li{display:flex;align-items:center;gap:0.25rem;font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text-dim)}
.ld{width:7px;height:7px;border-radius:2px}

/* Priority header */
.pri-hdr{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;padding:0.6rem 0 0.3rem;margin-top:0.8rem;border-bottom:1px solid var(--border);margin-bottom:0.5rem}
.pri-hdr.p1{color:var(--pink)}
.pri-hdr.p2{color:var(--amber)}
.pri-hdr.p3{color:var(--teal)}
.pri-hdr.p4{color:var(--text-muted)}

/* Category */
.cat{margin-bottom:1.6rem}
.ch{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem}
.ci{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0}
.cn{font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--text);flex:1}
.cc{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-dim)}
.cbw{height:3px;background:var(--border);border-radius:2px;margin-bottom:0.6rem;overflow:hidden}
.cbf{height:100%;border-radius:2px;transition:width 0.5s ease}

/* Task */
.tl{display:flex;flex-direction:column;gap:0.3rem}
.tk{display:flex;align-items:flex-start;gap:0.6rem;padding:0.55rem 0.7rem;border-radius:7px;border:1px solid var(--border);background:var(--surface);transition:all 0.15s;user-select:text}
.tk:hover{border-color:rgba(72,196,204,0.3);background:var(--surface2)}
.tk.done{border-color:rgba(34,197,94,0.2);background:rgba(34,197,94,0.03)}
.tk.done .tt{text-decoration:line-through;color:var(--text-muted)}
.ck{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;cursor:pointer;transition:all 0.15s}
.ck:hover{border-color:var(--teal);background:rgba(72,196,204,0.1)}
.tk.done .ck{border-color:var(--green);background:var(--green);color:var(--dark)}
.tb{flex:1;min-width:0}
.tt{font-size:0.8rem;font-weight:600;color:var(--text);line-height:1.3}
.td{font-size:0.72rem;color:var(--text-dim);margin-top:0.15rem;line-height:1.45}
.tgs{display:flex;gap:0.25rem;margin-top:0.25rem;flex-wrap:wrap}
.tg{font-family:'JetBrains Mono',monospace;font-size:0.55rem;padding:0.12rem 0.4rem;border-radius:3px;text-transform:uppercase;letter-spacing:0.04em}
.tg-done{background:rgba(34,197,94,0.12);color:var(--green)}
.tg-active{background:rgba(245,158,11,0.12);color:var(--amber)}
.tg-todo{background:rgba(74,85,104,0.2);color:var(--text-muted)}
.tg-zero{background:rgba(6,182,212,0.12);color:var(--cyan)}
.tg-low{background:rgba(34,197,94,0.1);color:#86EFAC}
.tg-med{background:rgba(245,158,11,0.1);color:#FCD34D}
.tg-high{background:rgba(239,68,68,0.1);color:#FCA5A5}
.tg-p{background:rgba(239,50,149,0.1);color:var(--pink)}

/* Footer */
.fw{text-align:center;margin-top:2rem;padding-top:1.2rem;border-top:1px solid var(--border)}
.bwrap{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.8rem}
.rst{font-family:'JetBrains Mono',monospace;font-size:0.6rem;padding:0.3rem 0.7rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;text-transform:uppercase;letter-spacing:0.08em}
.rst:hover{border-color:var(--red);color:var(--red)}

@media(max-width:600px){body{padding:1rem}.hdr h1{font-size:1.3rem}.sc{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="ctr">
<div class="hdr">
  <h1>YG MASTER PIPELINE</h1>
  <div class="sub">Full Business Build + Conversion Audit + Migration Tracker</div>
  <div class="dt">v3 — April 3, 2026</div>
</div>
<div class="sc" id="scorecard"></div>
<div class="mb"><div class="mbt"><span class="mbl">Overall Pipeline</span><span class="mbp" id="mPct">0%</span></div><div class="bt"><div class="bf" id="mFill"></div></div></div>
<div class="moto" id="moto"></div>
<div class="flt" id="flt"></div>
<div class="leg">
  <div class="li"><div class="ld" style="background:var(--cyan)"></div> Zero-touch</div>
  <div class="li"><div class="ld" style="background:#86EFAC"></div> Low</div>
  <div class="li"><div class="ld" style="background:#FCD34D"></div> Medium</div>
  <div class="li"><div class="ld" style="background:#FCA5A5"></div> High</div>
</div>
<div id="pipe"></div>
<div class="fw">
  <div class="bwrap">
    <button class="rst" style="border-color:var(--teal);color:var(--teal)" onclick="xport()">💾 Export Progress</button>
    <button class="rst" style="border-color:var(--amber);color:var(--amber)" onclick="document.getElementById('imp').click()">📂 Import Progress</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="imprt(event)">
  </div>
  <button class="rst" onclick="resetAll()">Reset All Progress</button>
  <div style="font-size:0.55rem;color:var(--text-muted);margin-top:0.5rem;font-family:'JetBrains Mono',monospace">Progress saves automatically. Export backs up to a file you can import later or on another machine.</div>
</div>
</div>
<script>
const SK='yg-pipe-v3';
const COL={conversion:'#EF3295',website:'#48C4CC',coaching:'#F472B6',content:'#F59E0B',business:'#3B82F6',automation:'#06B6D4',training:'#22C55E',migration:'#F9A8D4',habits:'#10B981'};
const ICO={conversion:'🎯',website:'🌐',coaching:'🏋️',content:'📝',business:'📊',automation:'⚙️',training:'💪',migration:'🔄',habits:'🧠'};

const P=[
{id:'conversion',title:'Conversion Fixes (Audit)',color:COL.conversion,tasks:[
// P1 — Ship this week
{id:'cx2',title:'Raise remote coaching price: $60 → $149/mo',detail:'Find every instance of $60/$99/month across all HTML files. Replace with $149/month. Keep "First week free" as risk reversal. $60 poisons the value perception of every other service on the site. Claude Code instruction file ready.',status:'todo',diff:'zero',priority:1},
{id:'cx3',title:'Gate the quiz result (email required)',detail:'Quiz is highest-engagement asset on the site. Change email from optional to required. Show archetype name + one line as teaser, gate full breakdown behind email. Copy: "Enter your email to get your full [Archetype] training breakdown." One field, button says "Get My Plan."',status:'todo',diff:'low',priority:1},
{id:'cx4',title:'Add email capture to all calculator tools',detail:'5 tool pages: VBT, macro, peptide, CrossFit, HYROX. Each gets contextual copy, Brevo API integration, different lead magnet offer. Appears inline AFTER results render. Component built and previewed. Needs Brevo API key + list IDs to go live.',status:'todo',diff:'med',priority:1},
{id:'cx5',title:'Hide "Athlete Portal — Coming Soon"',detail:'DONE: Portal is live at velocity-method.vercel.app/login. Deployed Apr 3 via Perplexity — Supabase + Vercel + GitHub CI pipeline. Magic link auth working.',status:'done',diff:'zero',priority:1},
// P2 — This month
{id:'cx6',title:'Add social proof bar below hero',detail:'One horizontal band: "96% competition attempt success rate · 5M+ lbs tracked · Athletes in 12+ states · ★★★★★ Average client rating." Sets authority in 5 seconds before any methodology copy.',status:'todo',diff:'low',priority:2},
{id:'cx7',title:'Hero copy rewrite (outcome-first)',detail:'Current hero ("Coached by Data. Built on Strength.") sells methodology, not outcome. Rewrite to lead with what client gets. Two versions written in audit: Performance athlete + Gen pop. Also add pink CTA button inside hero, above fold.',status:'todo',diff:'med',priority:2},
{id:'cx8',title:'Rewrite About/Brad bio section',detail:'Current copy undersells proof. Move credential stack (CF-L2, USAW, USAPL, PN1) higher. End on credibility note, not soft personal note. Two versions ready from audit. Add "96% USAPL attempt success rate" stat.',status:'todo',diff:'med',priority:2},
{id:'cx9',title:'Rewrite Offer/Services cards',detail:'Current cards use emojis + vague descriptors. "From $15" undermines premium positioning. Clean three-card layout with specific deliverables per tier. Show both Remote tiers ($149/$249).',status:'todo',diff:'med',priority:2},
{id:'cx10',title:'Rewrite footer/bottom CTA section',detail:'Current close is soft with no urgency or next-step clarity. Rewrite: set expectations for what happens when they book, how long, what they learn. Two versions in audit.',status:'todo',diff:'low',priority:2},
{id:'cx16',title:'Add Elite Remote tier: $249/month',detail:'Two-card layout: Standard Remote ($149, teal, "Most Popular") + Elite Remote ($249, pink, "For Competitors"). Biweekly video calls, meet prep priority, same-day response, monthly velocity report. Anchor pricing — $249 makes $149 feel reasonable. Preview built.',status:'todo',diff:'med',priority:2},
// P3
{id:'cx11',title:'Expand 3 testimonials on Results page',detail:'J. Martinez (powerlifter), A. Lopez (body recomp), M. Patel (remote). Expand to before/challenge/after/quote format. One per audience segment. Need Brad to confirm details.',status:'todo',diff:'med',priority:3},
{id:'cx12',title:'Add credibility stack below pricing table',detail:'What\'s included: velocity tracking every set, individualized programming, fatigue management, technique coaching, direct access. Plus one-line social proof. Appears directly below price when prospect feels uncertainty.',status:'todo',diff:'low',priority:3},
{id:'cx14',title:'Add remote athlete testimonial to Remote page',detail:'Specific remote success story that overcomes "remote isn\'t real coaching" objection. Needs Brad to provide actual client details.',status:'todo',diff:'med',priority:3},
{id:'cx15',title:'Move peptide consulting out of primary nav',detail:'Peptide consulting in main Services nav dilutes core coaching identity for first-time visitors. Move to dedicated page linked from footer or secondary nav.',status:'todo',diff:'low',priority:3},
// P4
{id:'cx17',title:'Write separate landing pages: athlete vs gen pop',detail:'Two entry points with different copy tracks. Performance athletes see velocity data and competition results. Gen pop sees body recomp and "stop wasting sessions" framing. High effort, high payoff. Copy drafted in audit.',status:'todo',diff:'high',priority:4},
]},
{id:'website',title:'Website Infrastructure',color:COL.website,tasks:[
{id:'w1',title:'Multi-page SPA architecture',detail:'Static HTML/CSS/JS on GitHub Pages at bradyeager.github.io/yeagers-gym. Hybrid: index.html is SPA (#page-home, #page-services, etc), standalone pages for tools, remote, nutrition, peptide consulting.',status:'done',diff:'high'},
{id:'w2',title:'All core pages built (10+)',detail:'Homepage, services, remote, nutrition, recovery, peptide consulting, results, contact, quiz, VBT calculators (1RM, Warmup, Load-Velocity, RPE Table, RPE-Velocity Converter). All functional.',status:'done',diff:'high'},
{id:'w3',title:'Nav + footer standardized',detail:'Services dropdown (In-Person, Remote, Nutrition, Peptide, Recovery). Tools dropdown (VBT Calc, Machine Converter, Macro Calc, Peptide Calc, Velocity Trackers). 3-column footer. Mobile nav with color-coded entries.',status:'done',diff:'med'},
{id:'w4',title:'Hero image finalized',detail:'Mirrored athlete facing right, geometric mandala tattoo. hero-tattoo-geo-fixed-v3.jpg. No velocity chart overlay. 1920x1071 JPEG.',status:'done',diff:'med'},
{id:'w13',title:'Homepage mockup v2 → live',detail:'Mockup complete: hero, testimonial ticker, problem/solution grid (3 pairs), Brad bio, Velocity Method 4-step grid, stats ticker, services preview, FAQ, CTA. NOT merged as live homepage yet. Known issues: mobile CTA stacking, purple on "not for everyone" block, missing Credentials label.',status:'active',diff:'med',priority:2},
{id:'w14',title:'Brand color migration to v2 palette',detail:'Update ALL CSS across every HTML file. Old: teal #1EC8B0, pink #F0448A. New: teal #48C4CC, pink #EF3295. Also update dark to #0A0E17. Search-and-replace operation. Claude Code can do this.',status:'todo',diff:'zero',priority:2},
{id:'w15',title:'Brevo form ID: quiz page',detail:'quiz.html still has Kit placeholder form IDs. Replace with Brevo form IDs. Need to create the form in Brevo first, then paste the ID.',status:'todo',diff:'low',priority:2},
{id:'w16',title:'Brevo form ID: macro calculator',detail:'tools-macro.html same issue as quiz — Kit placeholder needs Brevo form ID swap.',status:'todo',diff:'low',priority:2},
{id:'w18',title:'Remove Perplexity attribution tags',detail:'grep -rn -i "perplexity" *.html — remove all data attributes, comments, and metadata containing "perplexity" or "Perplexity". E-E-A-T risk: Google may penalize pages that look auto-generated. Claude Code instruction ready.',status:'todo',diff:'zero',priority:2},
{id:'w23',title:'HYROX Race Time Predictor page',detail:'New standalone tool: tools-hyrox.html. Division selector, 5K/pace input, 8 station test times (optional), fatigue model, weakness analysis with color bars, email capture built in. Page is BUILT — needs deployment to repo and nav link added to Tools dropdown.',status:'active',diff:'zero',priority:2},
{id:'w24',title:'Add HYROX to nav Tools dropdown',detail:'Add "HYROX Calculator" link to the Tools dropdown in nav and to the footer Resources section. Link to tools-hyrox.html.',status:'todo',diff:'zero',priority:2},
{id:'w19',title:'Full testimonial attribution',detail:'Results page and homepage testimonials currently use initials only (J. Martinez, A. Lopez, M. Patel). Update to full first names minimum. Better: add sport/context and timeframe.',status:'todo',diff:'low',priority:3},
{id:'w20',title:'Custom domain: yeagersgym.com',detail:'Currently live at bradyeager.github.io/yeagers-gym. Need to configure yeagersgym.com DNS to point to GitHub Pages. Involves: DNS A/CNAME records, GitHub Pages custom domain setting, CNAME file in repo.',status:'todo',diff:'low',priority:3},
{id:'w21',title:'SEO meta descriptions all pages',detail:'Every page needs: unique meta title (60 chars), meta description (150-160 chars with CTA), Open Graph tags (title, description, image for social sharing), primary keyword in H1 + first paragraph + one H2. Internal links 2+ per page.',status:'todo',diff:'med',priority:3},
{id:'w25',title:'Schema markup: LocalBusiness',detail:'Add JSON-LD structured data to homepage for Google local search. Include: business name, type (HealthClub/Gym), location (San Diego), services, URL, email. Do NOT include phone/address per brand rules.',status:'todo',diff:'zero',priority:3},
{id:'w26',title:'Accessibility baseline',detail:'All form inputs need labels. Color contrast 4.5:1 body, 3:1 large text. Keyboard nav on all interactive elements. Skip-to-content link on every page. WCAG 2.1 AA target.',status:'todo',diff:'med',priority:4},
{id:'w22',title:'Performance audit (Lighthouse)',detail:'Target: Lighthouse 90+ mobile. Hero image under 2.5s on 4G. Defer/async all JS. No render-blocking scripts. Compress images.',status:'todo',diff:'low',priority:4},
{id:'w27',title:'Fix homepage mockup v2 bugs',detail:'Three known issues: (1) Mobile CTA buttons stacking incorrectly, (2) Purple accent on "not for everyone" block should be pink/teal only, (3) Missing "Credentials" label above credentials grid.',status:'todo',diff:'low',priority:2},
]},
{id:'coaching',title:'Coaching OS (YG Performance Lab)',color:COL.coaching,tasks:[
{id:'c1',title:'YG AI spec v3.0 complete',detail:'Two-component system defined. Component 1: YG AI (weekly programming engine, generates structured programs). Component 2: The Velocity Method (daily readiness engine, adjusts loads/volume on real-time VBT data). Full spec documented.',status:'done',diff:'high'},
{id:'c2',title:'yg-master-prompt.md',detail:'Master prompt file for the AI programming engine. Defines six core lifts (squat, bench, deadlift, hip thrust, chin-up, strict press), velocity zones, set/rep schemes, fatigue management rules.',status:'done',diff:'high'},
{id:'c3',title:'Six core lifts + VBT zones',detail:'All velocity zones calibrated per lift. Accounts for Brad\'s slower velocity profile (aggregate VBT models underestimate advanced lifters). Population norms vs adjusted values flagged.',status:'done',diff:'med'},
{id:'c5',title:'Multi-LLM spec evaluation',detail:'Claude vs OpenAI vs Gemini sample week outputs scored against spec v3. Claude scored Output A (Perplexity) higher. Evaluation methodology documented.',status:'done',diff:'high'},
{id:'c6',title:'VBT competition tools',detail:'Power Density AMRAP leaderboard (6 movements, VBT scoring) + Seven Minutes in Heaven leaderboard (3 skill levels). Both: 43-athlete roster, Barlow Condensed/Share Tech Mono fonts, teal/pink, localStorage, TV mode.',status:'done',diff:'high'},
{id:'c8',title:'Yeager Engine repo',detail:'github.com/bradyeager/yeager-engine (private, TypeScript). Dashboard skeleton for client-facing programming delivery. Needs rebrand to current design system.',status:'done',diff:'high'},
{id:'c14',title:'SugarWOD evaluated + rejected',detail:'API is frozen, no further development possible. Decision: build custom. No action needed.',status:'done',diff:'low'},
{id:'c9',title:'Real-athlete 2-week pilot',detail:'Run YG AI + Velocity Method on 2-3 real athletes for 2 weeks. Validate: does the AI output match what Brad would prescribe? Are velocity thresholds triggering correctly? Does the readiness engine adjust loads appropriately?',status:'todo',diff:'high',priority:1},
{id:'c10',title:'Model Council QA check',detail:'Run spec v3 sample outputs through Model Council (Claude + GPT + Gemini). Consensus scoring on: exercise selection accuracy, load prescription appropriateness, velocity zone compliance, fatigue management logic.',status:'todo',diff:'med',priority:1},
{id:'c13',title:'JSON output schema finalized',detail:'DONE: 12 Supabase tables deployed (coaches, athletes, lifts, athlete_lifts, velocity_sessions, blocks, program_weeks, program_sessions, program_exercises, readiness_checks, session_reports, weekly_reviews). Full TypeScript types, RLS policies, indexes, triggers. Deployed Apr 3.',status:'done',diff:'med',priority:2},
{id:'c12',title:'First live weekly program',detail:'Generate and deliver one real weekly program through the AI pipeline to an actual client. Full loop: intake → AI generation → Brad review → client delivery → feedback.',status:'todo',diff:'med',priority:2},
{id:'c11',title:'Dashboard rebrand',detail:'Rebrand Yeager Engine dashboard to current design system (new teal #48C4CC, pink #EF3295, JetBrains Mono/Inter). Match the velocity-method.vercel.app portal aesthetic.',status:'todo',diff:'med',priority:3},
{id:'c15',title:'Velocity Method app deployed',detail:'DONE: Full Next.js + Supabase app live at velocity-method.vercel.app. 46 files, 6,793 lines. GitHub: bradyeager/velocity-method (private). CI: GitHub Actions (121 engine tests + tsc + build). Vercel auto-deploy. Anthropic OCR for screenshot velocity extraction. Deployed Apr 3 by Perplexity Computer.',status:'done',diff:'high'},
{id:'c16',title:'GitHub Actions CI pipeline',detail:'DONE: .github/workflows/ci.yml — runs engine tests (121/121), TypeScript type check, Next.js build on every push/PR to main. Placeholder Supabase env vars for CI build. Deployed Apr 3.',status:'done',diff:'med'},
]},
{id:'content',title:'Content & Marketing',color:COL.content,tasks:[
{id:'ct1',title:'VBT newsletter series (7 articles)',detail:'14 files delivered: 7 docx + 7 HTML. Dark Miami cyber aesthetic with alternating teal/pink heading text, pink callout bars, gradient CTA buttons. Build scripts: build-v2.js (approved), build-v4.js (headers/footers).',status:'done',diff:'high'},
{id:'ct3',title:'Velocity Method logos (2)',detail:'Neon sign style: teal outer border, barbell with 3 plates/side, "velocity" below graph, "method" above. Plus circular Instagram profile version.',status:'done',diff:'med'},
{id:'ct5',title:'Kit → Brevo migration',detail:'Email platform migration complete. Brevo is primary. Kit accounts can be deactivated.',status:'done',diff:'med'},
{id:'ct12',title:'Brevo welcome email sequence',detail:'Email 1 must deliver value (not just confirm signup). Plan: Email 1 = free resource delivery + one training insight. Email 2 (day 3) = social proof story. Email 3 (day 7) = "what data-driven coaching looks like" + CTA. Build in Brevo Automations.',status:'todo',diff:'med',priority:1},
{id:'ct13',title:'Brevo list segmentation setup',detail:'Create lists for: each lead magnet source (VBT, macro, peptide, CrossFit, HYROX, quiz), service interest (in-person, remote, nutrition, peptide), engagement level (active, cold). This enables targeted follow-up sequences.',status:'todo',diff:'med',priority:1},
{id:'ct6',title:'Lead PDF 1: Daily Readiness Playbook',detail:'White background, teal #48C4CC / pink #EF3295. Covers: what readiness check is, how to run one, velocity zones for readiness, decision tree for session adjustment. 8-10 pages. In progress.',status:'active',diff:'med',priority:2},

let st=load();let filt='all';
function load(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s)}catch(e){}return{ck:{}}}
function save(){try{localStorage.setItem(SK,JSON.stringify(st))}catch(e){}}
function init(){let ch=false;P.forEach(c=>c.tasks.forEach(t=>{if(!(t.id in st.ck)){st.ck[t.id]=t.status==='done';ch=true;}}));if(ch)save();}
function counts(){let d=0,a=0,td=0,z=0,lo=0,md=0,hi=0;P.forEach(c=>c.tasks.forEach(t=>{if(st.ck[t.id])d++;else if(t.status==='active')a++;else td++;if(!st.ck[t.id]){if(t.diff==='zero')z++;else if(t.diff==='low')lo++;else if(t.diff==='med')md++;else hi++;}}));return{d,a,td,total:d+a+td,z,lo,md,hi};}
function moto(p){if(p>=90)return"🔥 ALMOST THERE. FINISH WHAT YOU STARTED.";if(p>=75)return"💪 75%+ LOCKED. COMPOUND EFFECT IS UNDENIABLE.";if(p>=60)return"⚡ PAST HALFWAY. MOMENTUM COMPOUNDS.";if(p>=45)return"🎯 APPROACHING 50%. EVERY CHECK = LEVERAGE.";if(p>=30)return"🚀 VELOCITY BUILDING. KEEP STACKING.";if(p>=15)return"🏗️ SYSTEMS TAKING SHAPE.";return"🧱 THE EMPIRE STARTS HERE.";}
function diffTag(d){if(d==='zero')return'<span class="tg tg-zero">zero-touch</span>';if(d==='low')return'<span class="tg tg-low">low</span>';if(d==='med')return'<span class="tg tg-med">medium</span>';return'<span class="tg tg-high">high</span>';}
function statusTag(t){if(st.ck[t.id])return'<span class="tg tg-done">done</span>';if(t.status==='active')return'<span class="tg tg-active">in progress</span>';return'<span class="tg tg-todo">to do</span>';}

function render(){
const cn=counts();const pct=cn.total>0?Math.round((cn.d/cn.total)*100):0;
document.getElementById('scorecard').innerHTML=`<div class="sb"><div class="sn" style="color:var(--green)">${cn.d}</div><div class="sl">Done</div></div><div class="sb"><div class="sn" style="color:var(--amber)">${cn.a+cn.td}</div><div class="sl">Remaining</div></div><div class="sb"><div class="sn" style="color:var(--cyan)">${cn.z}</div><div class="sl">Zero-touch</div></div><div class="sb"><div class="sn" style="color:#86EFAC">${cn.lo}</div><div class="sl">Low effort</div></div>`;
document.getElementById('mPct').textContent=pct+'%';
document.getElementById('mFill').style.width=pct+'%';
document.getElementById('moto').textContent=moto(pct);
document.getElementById('flt').innerHTML=['all','remaining','zero-touch','low','in-progress','done'].map(f=>`<button class="fb ${filt===f?'on':''}" onclick="setF('${f}')">${f}</button>`).join('');

const el=document.getElementById('pipe');let html='';
P.forEach(cat=>{
  let tasks=cat.tasks.slice();
  tasks.sort((a,b)=>{const pa=a.priority||99,pb=b.priority||99;if(pa!==pb)return pa-pb;const sa=st.ck[a.id]?2:(a.status==='active'?0:1);const sb=st.ck[b.id]?2:(b.status==='active'?0:1);return sa-sb;});
  if(filt==='remaining')tasks=tasks.filter(t=>!st.ck[t.id]);
  else if(filt==='zero-touch')tasks=tasks.filter(t=>!st.ck[t.id]&&t.diff==='zero');
  else if(filt==='low')tasks=tasks.filter(t=>!st.ck[t.id]&&t.diff==='low');
  else if(filt==='in-progress')tasks=tasks.filter(t=>!st.ck[t.id]&&t.status==='active');
  else if(filt==='done')tasks=tasks.filter(t=>st.ck[t.id]);
  if(tasks.length===0&&filt!=='all')return;
  const cd=cat.tasks.filter(t=>st.ck[t.id]).length;const ct=cat.tasks.length;const cp=ct>0?Math.round((cd/ct)*100):0;
  html+=`<div class="cat"><div class="ch"><div class="ci" style="background:${cat.color}22;color:${cat.color}">${ICO[cat.id]}</div><div class="cn">${cat.title}</div><div class="cc">${cd}/${ct} (${cp}%)</div></div><div class="cbw"><div class="cbf" style="width:${cp}%;background:${cat.color}"></div></div><div class="tl">`;

  // Group by priority
  let lastPri=null;
  tasks.forEach(t=>{
    const pri=t.priority||99;
    if(filt==='all'&&!st.ck[t.id]&&pri!==99&&pri!==lastPri){
      const labels={1:'P1 — Do This Week',2:'P2 — Do This Month',3:'P3 — Next',4:'P4 — Backlog'};
      const cls={1:'p1',2:'p2',3:'p3',4:'p4'};
      html+=`<div class="pri-hdr ${cls[pri]||'p4'}">${labels[pri]||'Backlog'}</div>`;
      lastPri=pri;
    }
    if(st.ck[t.id]&&lastPri!=='done-hdr'&&filt==='all'){
      html+=`<div class="pri-hdr p3">Completed</div>`;
      lastPri='done-hdr';
    }
    const dn=st.ck[t.id];
    html+=`<div class="tk ${dn?'done':''}"><div class="ck" onclick="event.stopPropagation();tog('${t.id}')">${dn?'✓':''}</div><div class="tb"><div class="tt">${t.title}</div><div class="td">${t.detail}</div><div class="tgs">${statusTag(t)} ${diffTag(t.diff)}${t.priority?` <span class="tg tg-p">P${t.priority}</span>`:''}</div></div></div>`;
  });
  html+=`</div></div>`;
});
el.innerHTML=html;
}

function tog(id){st.ck[id]=!st.ck[id];save();render();}
function setF(f){filt=f;render();}
function resetAll(){if(confirm('Reset all progress? Cannot be undone.')){st={ck:{}};save();init();render();}}
function xport(){var d=JSON.stringify(st,null,2);var b=new Blob([d],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='yg-pipeline-'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(u);}
function imprt(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.ck){st=d;save();init();render();alert('Imported! '+Object.values(st.ck).filter(Boolean).length+' items complete.');}else alert('Invalid file.');}catch(err){alert('Error: '+err.message);}};r.readAsText(f);e.target.value='';}

init();render();
</script>
